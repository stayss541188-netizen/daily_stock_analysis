name: Sync Uploaded DailyStock Package

on:
  push:
    paths:
      - '.github/workflows/99-sync-uploaded-package.yml'
      - 'DailyStock_GitHub同步文件.zip'
      - 'DailyStock_GitHub同步文件/**'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: sync-uploaded-dailystock-package
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Unpack uploaded package
        run: |
          set -euo pipefail
          if [ ! -f "DailyStock_GitHub同步文件.zip" ]; then
            echo "Missing DailyStock_GitHub同步文件.zip"
            exit 1
          fi
          rm -rf _dailystock_sync
          python - <<'PY'
          from pathlib import Path
          from zipfile import ZipFile

          source = Path("DailyStock_GitHub同步文件.zip")
          dest = Path("_dailystock_sync")
          dest.mkdir(parents=True, exist_ok=True)

          with ZipFile(source) as archive:
              for item in archive.infolist():
                  normalized = item.filename.replace("\\", "/")
                  parts = [
                      part
                      for part in normalized.split("/")
                      if part and part not in {".", ".."}
                  ]
                  if not parts:
                      continue
                  target = dest.joinpath(*parts)
                  if item.is_dir():
                      target.mkdir(parents=True, exist_ok=True)
                      continue
                  target.parent.mkdir(parents=True, exist_ok=True)
                  with archive.open(item) as src, target.open("wb") as out:
                      out.write(src.read())
          PY
          find _dailystock_sync -maxdepth 4 -type f | sort

      - name: Copy files to repository root
        run: |
          set -euo pipefail
          rm -rf _dailystock_sync/.github
          cp -a _dailystock_sync/. ./
          rm -rf _dailystock_sync
          rm -rf "DailyStock_GitHub同步文件" "DailyStock_GitHub同步文件.zip"

      - name: Commit synced files
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: sync DailyStock desktop package"
          git push
