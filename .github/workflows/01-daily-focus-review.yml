name: 收盘重点筛选

on:
  # 北京时间 18:15，收盘后做复盘筛选；GitHub cron 使用 UTC。
  schedule:
    - cron: '15 10 * * 1-5'

  workflow_dispatch:
    inputs:
      push:
        description: '发送钉钉重点筛选摘要'
        required: false
        default: true
        type: boolean
      run_market:
        description: '同时运行大盘复盘'
        required: false
        default: true
        type: boolean
      run_ai:
        description: '只对入选个股运行 AI 分析'
        required: false
        default: true
        type: boolean
      force_run:
        description: '传给 main.py，跳过交易日检查'
        required: false
        default: false
        type: boolean
      max_stocks:
        description: '最多入选重点个股数'
        required: false
        default: '8'
        type: string

concurrency:
  group: daily-focus-review
  cancel-in-progress: false

jobs:
  focus-review:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ fromJSON(vars.FOCUS_TIMEOUT_MINUTES || vars.ANALYSIS_TIMEOUT_MINUTES || '60') }}

    env:
      PYTHONUTF8: '1'
      PYTHONIOENCODING: utf-8

      STOCK_LIST: ${{ vars.STOCK_LIST || secrets.STOCK_LIST || vars.STOCK_LIST_CONFIG || secrets.STOCK_LIST_CONFIG }}
      SINGLE_STOCK_NOTIFY: ${{ vars.SINGLE_STOCK_NOTIFY || 'true' }}
      SINGLE_STOCK_NOTIFY_FILTER: ${{ vars.SINGLE_STOCK_NOTIFY_FILTER || 'important' }}
      SINGLE_STOCK_NOTIFY_SCORE_THRESHOLD: ${{ vars.SINGLE_STOCK_NOTIFY_SCORE_THRESHOLD || '65' }}

      DINGTALK_WEBHOOK_URL: ${{ secrets.DINGTALK_WEBHOOK_URL }}
      DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
      WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
      FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
      FEISHU_WEBHOOK_SECRET: ${{ secrets.FEISHU_WEBHOOK_SECRET }}
      PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}

      YUNAI_AUTHORIZATION: ${{ secrets.YUNAI_AUTHORIZATION || secrets.YUNAI_API_KEY }}
      YUNAI_BASE_URL: ${{ vars.YUNAI_BASE_URL || 'https://quant.yunai.com.cn/quant-market' }}
      YUNAI_PRIORITY: ${{ vars.YUNAI_PRIORITY || '1' }}
      REALTIME_SOURCE_PRIORITY: ${{ vars.REALTIME_SOURCE_PRIORITY || 'yunai,tickflow,tushare,sina,akshare_em' }}
      FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
      ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
      TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
      TICKFLOW_API_KEY: ${{ secrets.TICKFLOW_API_KEY }}

      GENERATION_BACKEND: ${{ vars.GENERATION_BACKEND || 'litellm' }}
      GENERATION_FALLBACK_BACKEND: ${{ vars.GENERATION_FALLBACK_BACKEND || 'litellm' }}
      LITELLM_MODEL: ${{ vars.LITELLM_MODEL || 'deepseek/deepseek-chat' }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      DEEPSEEK_API_KEYS: ${{ secrets.DEEPSEEK_API_KEYS }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      AIHUBMIX_KEY: ${{ secrets.AIHUBMIX_KEY }}

      BACKTEST_ENABLED: 'false'
      AGENT_SKILL_AUTOWEIGHT: 'false'
      MARKET_REVIEW_ENABLED: 'true'
      DAILY_MARKET_CONTEXT_ENABLED: 'true'

      FOCUS_MAX_STOCKS: ${{ github.event.inputs.max_stocks || vars.FOCUS_MAX_STOCKS || '8' }}
      FOCUS_TOP_THEMES: ${{ vars.FOCUS_TOP_THEMES || '5' }}
      FOCUS_BATCH_SIZE: ${{ vars.FOCUS_BATCH_SIZE || '50' }}
      FOCUS_MIN_CHANGE_PCT: ${{ vars.FOCUS_MIN_CHANGE_PCT || '2.0' }}
      FOCUS_MIN_ABS_CHANGE_PCT: ${{ vars.FOCUS_MIN_ABS_CHANGE_PCT || '3.0' }}
      FOCUS_MIN_VOLUME_RATIO: ${{ vars.FOCUS_MIN_VOLUME_RATIO || '1.5' }}
      FOCUS_REQUIRE_FRESH: ${{ vars.FOCUS_REQUIRE_FRESH || 'true' }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: 创建目录
        run: mkdir -p data logs reports

      - name: 收盘重点筛选
        run: |
          PUSH_ARG="--push"
          MARKET_ARG="--run-market"
          AI_ARG="--run-ai"
          FORCE_ARG=""

          if [ "${{ github.event_name }}" = "schedule" ]; then
            MARKET_ARG=""
            AI_ARG=""
          fi

          if [ "${{ github.event.inputs.push }}" = "false" ]; then
            PUSH_ARG=""
          fi
          if [ "${{ github.event.inputs.run_market }}" = "false" ]; then
            MARKET_ARG=""
          fi
          if [ "${{ github.event.inputs.run_ai }}" = "false" ]; then
            AI_ARG=""
          fi
          if [ "${{ github.event.inputs.force_run }}" = "true" ]; then
            FORCE_ARG="--force-run"
          fi

          python scripts/daily_focus_review.py $PUSH_ARG $MARKET_ARG $AI_ARG $FORCE_ARG

      - name: 上传报告和日志
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: focus-review-${{ github.run_number }}
          path: |
            reports/
            logs/
          retention-days: 30
